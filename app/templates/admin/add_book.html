{% extends "layout/base_admin.html" %}

{% block title %}Thêm Sách Mới - OU BOOK{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb bg-transparent p-0 mb-4">
        <li class="breadcrumb-item"><a href="{{ url_for('admin.admin_dashboard') }}" class="text-decoration-none">Admin</a></li>
        <li class="breadcrumb-item"><a href="{{ url_for('admin.manage_books') }}" class="text-decoration-none">Quản lý sách</a></li>
        <li class="breadcrumb-item active">Thêm sách mới</li>
    </ol>
</nav>

<div class="d-flex align-items-center mb-4">
    <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-3" style="min-width: 40px; height: 40px;">
        <i class="fas fa-plus"></i>
    </div>
    <h2 class="h4 mb-0 fw-bold text-dark">Thêm Sách Mới</h2>
</div>

<div class="card shadow-sm border-0 rounded-3">
    <div class="card-header bg-primary text-white py-3">
        <h6 class="mb-0 fw-bold"><i class="fas fa-edit me-2"></i>Thông tin chi tiết sách</h6>
    </div>
    <div class="card-body p-4">
        <form method="POST" action="{{ url_for('admin.add_book') }}" enctype="multipart/form-data" class="needs-validation" novalidate>
            <div class="row g-4">
                <div class="col-md-8">
                    <label class="form-label fw-bold small">Tên sách <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-book text-muted"></i></span>
                        <input type="text" class="form-control border-start-0 shadow-none" name="title" placeholder="Nhập tên sách đầy đủ" required>
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold small">Mã ISBN</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-barcode text-muted"></i></span>
                        <input type="text" class="form-control border-start-0 shadow-none" name="isbn" placeholder="Mã số chuẩn">
                    </div>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold small">Tác giả</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
                        <input type="text" class="form-control border-start-0 shadow-none" name="author" placeholder="Tên tác giả">
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold small">Danh mục <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-tag text-muted"></i></span>
                        <select class="form-select border-start-0 shadow-none" name="category_id" required>
                            <option value="" selected disabled>Chọn danh mục phù hợp...</option>
                            {% for cat in categories %}
                            <option value="{{ cat.id }}">{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-bold small">Giá tiền (VNĐ)</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-money-bill-wave text-muted"></i></span>
                        <input type="number" class="form-control border-start-0 shadow-none" name="price" placeholder="0">
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold small">Ngôn ngữ</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-globe text-muted"></i></span>
                        <input type="text" class="form-control border-start-0 shadow-none" name="language" placeholder="Tiếng Việt, Anh...">
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold small">Tổng số lượng <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-boxes text-muted"></i></span>
                        <input type="number" class="form-control border-start-0 shadow-none" name="total_quantity" required placeholder="0">
                    </div>
                </div>

                <div class="col-md-12">
                    <label class="form-label fw-bold small">Thông tin xuất bản</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-building text-muted"></i></span>
                        <input type="text" class="form-control border-start-0 shadow-none" name="publication_info" placeholder="Nhà xuất bản Kim Đồng, 2024...">
                    </div>
                </div>

                <div class="col-md-12">
                    <label class="form-label fw-bold small">Mô tả nội dung</label>
                    <textarea class="form-control shadow-none" name="description" rows="4" placeholder="Nhập tóm tắt nội dung sách..."></textarea>
                </div>

                <div class="col-md-12">
                    <label class="form-label fw-bold small">Ảnh bìa sách</label>
                    <input type="file" class="form-control shadow-none" name="image" accept="image/*">
                </div>
            </div>

            <div class="mt-5 d-flex justify-content-end gap-2">
                <a href="{{ url_for('admin.manage_books') }}" class="btn btn-outline-secondary px-4">Hủy bỏ</a>
                <button type="submit" class="btn btn-primary px-5 fw-bold shadow-sm">Lưu thông tin sách</button>
            </div>
        </form>
    </div>
</div>

<style>
    /* Khử lỗi input group border */
    .input-group-text { border-color: #dee2e6; transition: all 0.2s; }
    .form-control, .form-select { border-color: #dee2e6; }

    /* Hiệu ứng focus đồng bộ */
    .input-group:focus-within .input-group-text {
        border-color: #0d6efd;
        background-color: #f8f9ff !important;
    }
    .form-control:focus, .form-select:focus {
        border-color: #0d6efd;
    }
</style>

<script>
    (function () {
        'use strict'
        var forms = document.querySelectorAll('.needs-validation')
        Array.prototype.slice.call(forms).forEach(function (form) {
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                }
                form.classList.add('was-validated')
            }, false)
        })
    })()
</script>
{% endblock %}
