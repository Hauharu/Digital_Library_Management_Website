{% extends 'layout/base.html' %}

{% block title %}Tìm kiếm: {{ search_query or 'Tất cả sách' }}{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/search.css') }}">
{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row">
        <!-- Sidebar Filter -->
        <div class="col-lg-3 mb-4">
            <div class="card border-0 shadow-sm rounded-4 sticky-top" style="top: 90px;">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-4 d-flex align-items-center">
                        <i class="fa-solid fa-filter me-2 text-primary"></i> Bộ lọc
                    </h5>

                    <form action="{{ url_for('main.search') }}" method="GET" id="advanced-filter-form">
                        <input type="hidden" name="q" value="{{ search_query }}">

                        <div class="mb-4">
                            <label class="form-label fw-semibold small text-uppercase text-muted">Danh mục</label>
                            <select name="category" class="form-select border-0 bg-light rounded-3">
                                <option value="">Tất cả danh mục</option>
                                {% for cat in filter_options.categories %}
                                <option value="{{ cat.id }}" {{ 'selected' if filters.category==cat.id else '' }}>
                                    {{ cat.name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold small text-uppercase text-muted">Ngôn ngữ</label>
                            <select name="language" class="form-select border-0 bg-light rounded-3">
                                <option value="">Tất cả ngôn ngữ</option>
                                {% for lang in filter_options.languages %}
                                <option value="{{ lang }}" {{ 'selected' if filters.language==lang else '' }}>
                                    {{ lang }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary fw-bold rounded-3 py-2 shadow-sm">
                                <i class="fa-solid fa-check-double me-1"></i> Áp dụng bộ lọc
                            </button>
                            <button type="button" id="btn-clear-filter" class="btn fw-semibold rounded-3 py-2 shadow-sm" style="background-color: #64748b; color: #fff;">
                                <i class="fa-solid fa-eraser me-1"></i> Xóa bộ lọc
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Results Section -->
        <div class="col-lg-9" id="results-area">
            {% include 'book/partials/_search_results_grid.html' %}
        </div>
    </div>
</div>

{% endblock %}
