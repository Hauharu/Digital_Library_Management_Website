{% extends 'layout/base.html' %}

{% block title %}Đăng ký mượn sách{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3">
                    <h4 class="mb-0 text-primary">
                        <i class="fa-solid fa-book-open-reader me-2"></i>Phiếu đăng ký mượn sách
                    </h4>
                </div>
                <div class="card-body">
                    <div class="alert alert-info mb-4">
                        <div><strong>Sách:</strong> {{ book.title }}</div>
                        <div><strong>Tác giả:</strong> {{ book.author or 'Chưa cập nhật' }}</div>
                        <div><strong>Số lượng còn:</strong> {{ quantity_available }} cuốn</div>
                    </div>

                    <form method="post" action="{{ url_for('user.borrow_book', book_id=book.id) }}">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Tên độc giả</label>
                                <input class="form-control" type="text"
                                       value="{{ current_user.last_name }} {{ current_user.first_name }}" readonly>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Số điện thoại</label>
                                <input class="form-control" type="text"
                                       value="{{ current_user.phone_number or 'Chưa cập nhật' }}" readonly>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Địa chỉ mail</label>
                            <input class="form-control" type="email" value="{{ current_user.email }}" readonly>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="start_date" class="form-label fw-semibold">Từ ngày</label>
                                <input id="start_date" name="start_date" class="form-control" type="date"
                                       min="{{ today }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="end_date" class="form-label fw-semibold">Đến ngày</label>
                                <input id="end_date" name="end_date" class="form-control" type="date"
                                       min="{{ today }}" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="quantity" class="form-label fw-semibold">Số lượng mượn</label>
                            <input id="quantity" name="quantity" class="form-control" type="number"
                                   min="1" max="{{ quantity_available if quantity_available > 0 else 1 }}"
                                   value="1" required {{ 'disabled' if quantity_available <= 0 else '' }}>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fa-solid fa-paper-plane me-1"></i>Gửi yêu cầu mượn
                            </button>
                            <a class="btn btn-outline-secondary"
                               href="{{ url_for('main.book_detail', book_id=book.id) }}?from=featured">
                                Quay lại chi tiết sách
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
