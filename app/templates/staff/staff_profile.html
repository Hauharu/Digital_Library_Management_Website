{% extends 'layout/base_staff.html' %}

{% block content %}
<div class="container py-4">
    <div class="row">
        <!-- Sidebar / Profile Card -->
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm border-0 text-center h-100 rounded-4 overflow-hidden">
                <div class="card-body d-flex flex-column align-items-center py-5">
                    <div class="avatar-upload-wrapper mb-4">
                        <div class="avatar-container shadow-sm border border-4 border-white"
                            onclick="document.getElementById('avatar-input').click()" style="cursor: pointer;">
                            <img src="{{ current_user.avatar if current_user.avatar else 'https://res.cloudinary.com/dwwfgtxv4/image/upload/v1776585521/AnhDaiDien_nvnfre.png' }}"
                                alt="avatar" class="rounded-circle w-100 h-100" style="object-fit: cover;"
                                id="profile-avatar-preview">
                            <div class="avatar-overlay d-flex align-items-center justify-content-center">
                                <i class="fa-solid fa-camera text-white fs-4"></i>
                            </div>
                        </div>
                        <form id="avatar-form" action="{{ url_for('user.update_avatar') }}" method="POST"
                            enctype="multipart/form-data" class="d-none">
                            <input type="file" name="avatar" id="avatar-input" accept="image/*"
                                onchange="this.form.submit()">
                        </form>
                    </div>

                    <style>
                        .avatar-container {
                            position: relative;
                            width: 150px;
                            height: 150px;
                            border-radius: 50%;
                            overflow: hidden;
                        }

                        .avatar-overlay {
                            position: absolute;
                            top: 0;
                            left: 0;
                            width: 100%;
                            height: 100%;
                            background: rgba(0, 0, 0, 0.4);
                            opacity: 0;
                            transition: opacity 0.3s ease;
                        }

                        .avatar-container:hover .avatar-overlay {
                            opacity: 1;
                        }
                    </style>
                    <h3 class="fw-bold text-dark mb-1">{{ current_user.last_name }} {{ current_user.first_name }}</h3>
                    <div class="badge bg-primary-soft text-primary px-3 py-2 rounded-pill mb-4">STAFF</div>

                    <hr class="w-100 opacity-10">

                    <div class="w-100 px-3 text-start mt-3">
                        <div class="d-flex align-items-center mb-2">
                            <i class="fa-solid fa-envelope text-muted me-3" style="width: 20px;"></i>
                            <span class="text-muted small">{{ current_user.email }}</span>
                        </div>
                        <div class="d-flex align-items-center mb-2">
                            <i class="fa-solid fa-phone text-muted me-3" style="width: 20px;"></i>
                            <span class="text-muted small">{{ current_user.phone_number or 'Chưa cập nhật' }}</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Forms Section -->
        <div class="col-md-8">
            <!-- Panel 1: Hồ sơ cá nhân -->
            <div class="card shadow-sm border-0 mb-4 rounded-4 overflow-hidden">
                <div class="card-header bg-white border-bottom-0 pt-4 px-4 pb-0">
                    <h5 class="fw-bold text-primary"><i class="fa-solid fa-user-pen me-2"></i>Hồ sơ cá nhân</h5>
                </div>
                <div class="card-body p-4">
                    <form method="post" action="{{ url_for('staff.update_profile') }}">
                        <div class="row g-3">
                            <div class="col-md-12">
                                <label class="form-label fw-semibold small">Họ và tên</label>
                                <input class="form-control bg-light border-0 py-2" type="text" name="full_name"
                                    value="{{ current_user.last_name }} {{ current_user.first_name }}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold small">Số điện thoại</label>
                                <input class="form-control bg-light border-0 py-2" type="text" name="phone_number"
                                    value="{{ current_user.phone_number or '' }}" placeholder="Ví dụ: 0912345678">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold small d-block">Giới tính</label>
                                <div class="d-flex gap-3 pt-2">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="gender" id="g1" value="Nam"
                                            {% if current_user.gender.name=='Male' %}checked{% endif %}>
                                        <label class="form-check-label small" for="g1">Nam</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="gender" id="g2" value="Nữ" {%
                                            if current_user.gender.name=='Female' %}checked{% endif %}>
                                        <label class="form-check-label small" for="g2">Nữ</label>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-semibold small">Email (Không thể thay đổi)</label>
                                <input class="form-control bg-light border-0 py-2 opacity-75" type="email"
                                    value="{{ current_user.email }}" readonly tabindex="-1">
                            </div>
                        </div>
                        <div class="mt-4">
                            <button class="btn btn-primary px-4 rounded-pill fw-bold" type="submit">
                                <i class="fa-regular fa-floppy-disk me-2"></i> Lưu thay đổi
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Panel 2: Đổi mật khẩu -->
            <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
                <div class="card-header bg-white border-bottom-0 pt-4 px-4 pb-0">
                    <h5 class="fw-bold text-danger"><i class="fa-solid fa-lock me-2"></i>Đổi mật khẩu</h5>
                </div>
                <div class="card-body p-4">
                    <form method="post" action="{{ url_for('staff.update_password') }}">
                        <div class="row g-3">
                            <div class="col-md-12">
                                <label class="form-label fw-semibold small">Mật khẩu hiện tại</label>
                                <input class="form-control bg-light border-0 py-2" type="password"
                                    name="current_password" required placeholder="Nhập mật khẩu cũ">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold small">Mật khẩu mới</label>
                                <input class="form-control bg-light border-0 py-2" type="password" name="new_password"
                                    required placeholder="Nhập mật khẩu mới">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold small">Xác nhận mật khẩu</label>
                                <input class="form-control bg-light border-0 py-2" type="password"
                                    name="confirm_password" required placeholder="Nhập lại mật khẩu mới">
                            </div>
                        </div>
                        <div class="mt-4">
                            <button class="btn btn-danger px-4 rounded-pill fw-bold" type="submit">
                                <i class="fa-solid fa-shield-halved me-2"></i> Cập nhật mật khẩu
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>

</style>
{% endblock %}
