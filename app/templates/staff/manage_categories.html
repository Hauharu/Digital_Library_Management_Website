{% extends "layout/base_staff.html" %} {% block content %}
<div class="container mt-4">
    <h2>Quản lý thể loại sách</h2>
    
    <div class="card my-4">
        <div class="card-body">
            <form action="{{ url_for('staff.add_category') }}" method="POST" class="row g-3">
                <div class="col-auto">
                    <input type="text" name="name" class="form-control" placeholder="Tên thể loại mới" required>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">Thêm thể loại</button>
                </div>
            </form>
        </div>
    </div>

    <table class="table table-hover">
        <thead>
            <tr>
                <th>ID</th>
                <th>Tên thể loại</th>
                <th>Số lượng sách</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody>
            {% for cat in categories %}
            <tr>
                <td>{{ cat.id }}</td>
                <td>{{ cat.name }}</td>
                <td>{{ cat.books|length }}</td>
                <td>
                    <button class="btn btn-sm btn-warning" onclick="editCategory('{{ cat.id }}', '{{ cat.name }}')">Sửa</button>
                    
                    <form action="{{ url_for('staff.delete_category', id=cat.id) }}" method="POST" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Bạn có chắc muốn xóa?')">Xóa</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

    <!-- Edit Category Modal -->
    <div class="modal fade" id="editCategoryModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-warning text-dark border-0 py-3">
                    <h5 class="modal-title fw-bold"><i class="fa-solid fa-pen-to-square me-2"></i>Chỉnh sửa thể loại</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="editCategoryForm" method="POST">
                    <div class="modal-body py-4">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tên thể loại mới</label>
                            <input type="text" name="name" id="editCategoryName" class="form-control form-control-lg shadow-sm" required>
                        </div>
                    </div>
                    <div class="modal-footer border-0 pb-4">
                        <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-warning px-4 fw-bold">Lưu thay đổi</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
function editCategory(id, name) {
    const modal = new bootstrap.Modal(document.getElementById('editCategoryModal'));
    const form = document.getElementById('editCategoryForm');
    const input = document.getElementById('editCategoryName');
    
    input.value = name;
    form.action = '/staff/edit-category/' + id;
    
    modal.show();
}
</script>
{% endblock %}
